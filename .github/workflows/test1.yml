name: Test1

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 */6 *' # At 04:00 on the 1st of every 3rd month.

jobs:
  Test1:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for branch deletion
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to retrieve full commit log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip google-genai
      - name: Install GitHub CLI
        run: sudo apt-get install -y gh

      - name: Filter and Archive Stale Branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          #Reza commented the following1
          #AGE_CUTOFF=800 # In days
          #Reza added the following2
          AGE_CUTOFF=-1 
          
          MAIN_BRANCH=master
          
          # Fetch all branches
          git branch -r | grep -v '\->' | sed 's/origin\///' > branches.txt
          echo "Reza starts the loop..."
          echo "Reza is in the loop..."
          echo "Reza is in the loop2..."
          # Loop through branches
          while read branch; do
            continue
            
                        
          done < branches.txt
